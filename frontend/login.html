<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — Doraemon Wiki</title>
  <meta name="description" content="Đăng nhập vào Doraemon Gadget Wiki." />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
</head>

<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="container nav__inner">
      <a class="nav__logo" href="index.html">
        <div class="nav__logo-icon">🔔</div>
        <span>Doraemon<strong>Wiki</strong></span>
      </a>
      <ul class="nav__links">
        <li class="nav__link"><a href="index.html">Trang Chủ</a></li>
        <li class="nav__link"><a href="movies.html">🎬 Phim Dài</a></li>
        <li class="nav__link"><a href="about.html">📝 Giới Thiệu</a></li>
      </ul>
      <div class="nav__actions">
        <div class="nav__search-wrapper">
          <form class="nav__search" id="navSearchForm">
            <input type="text" id="navSearchInput" placeholder="Tìm phim..." autocomplete="off" />
            <button type="submit" class="nav__search-btn" aria-label="Tìm kiếm">🔍</button>
          </form>
          <div class="nav__search-dropdown" id="navSearchDropdown"></div>
        </div>
        <div class="nav__auth-wrapper">
          <button class="nav__auth-btn" id="navAuthBtn" aria-haspopup="true" aria-expanded="false"></button>
          <div class="nav__auth-panel" id="navAuthPanel" role="menu"></div>
        </div>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="container">
      <div class="auth-card">
        <h1 class="auth-title">Đăng nhập</h1>
        <div class="auth-subtitle">Nhập thông tin để truy cập tài khoản.</div>

        <form id="loginForm" class="auth-form">
          <div class="auth-field">
            <label for="loginUser">Tên đăng nhập / Email</label>
            <input id="loginUser" name="usernameOrEmail" type="text" placeholder="vd: nobita hoặc nobita@email.com"
              required />
          </div>

          <div class="auth-field">
            <label for="loginPassword">Mật khẩu</label>
            <input id="loginPassword" name="password" type="password" placeholder="••••••••" required
              minlength="8" />
          </div>

          <div class="auth-actions">
            <button class="btn btn--primary" type="submit">Đăng nhập</button>
            <a href="register.html" class="btn btn--secondary">Tạo tài khoản</a>
          </div>

          <div id="authError" class="auth-error" aria-live="polite"></div>
        </form>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <span class="nav__logo-icon">🔔</span>
        <span class="footer__brand-name">Doraemon<strong>Wiki</strong></span>
      </div>
      <div class="footer__links">
        <a href="index.html">Trang Chủ</a>
        <a href="movies.html">Phim Dài</a>
      </div>
      <div class="footer__copy">Fan-made project · Không có bản quyền thương mại</div>
    </div>
  </footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/favorites.js"></script>
  <script src="assets/js/error-banner.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/pages/login.js"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
